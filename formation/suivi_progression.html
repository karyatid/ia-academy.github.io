<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi de Progression | IA Academy</title>
    <style>
        :root {
            --primary-color: #6366f1; --bg-primary: #ffffff; --bg-secondary: #f8fafc;
            --bg-tertiary: #f1f5f9; --text-primary: #1e293b; --text-secondary: #64748b;
            --border-color: rgba(99, 102, 241, 0.15); --glass-bg: rgba(255, 255, 255, 0.8);
            --card-bg: rgba(255, 255, 255, 0.9); --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        [data-theme="dark"] {
            --bg-primary: #0f172a; --bg-secondary: #1e293b; --bg-tertiary: #334155;
            --text-primary: #e2e8f0; --text-secondary: #cbd5e1;
            --border-color: rgba(99, 102, 241, 0.3); --glass-bg: rgba(15, 23, 42, 0.8);
            --card-bg: rgba(15, 23, 42, 0.9); --shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; line-height: 1.6;
            color: var(--text-primary);
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
            background-attachment: fixed; min-height: 100vh; transition: all 0.3s ease; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        .header { background: var(--glass-bg); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color); padding: 1rem 0;
            position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
        .header-inner { display: flex; align-items: center; justify-content: space-between; }
        .breadcrumb { font-size: 0.85rem; color: var(--text-secondary); }
        .breadcrumb a { color: var(--primary-color); text-decoration: none; }
        .theme-btn { background: var(--border-color); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 1.2rem; }
        .main-content { padding: 3rem 0; }
        .page-title { font-size: 2.2rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.5rem; }
        .page-subtitle { color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 2rem; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 2rem;
            border: 1px solid var(--border-color); box-shadow: var(--shadow); margin-bottom: 1.5rem; }
        .card h2 { color: var(--primary-color); margin-bottom: 1rem; font-size: 1.4rem; }
        .card h3 { color: var(--text-primary); margin-bottom: 0.75rem; font-size: 1.1rem; }
        .card p { color: var(--text-secondary); line-height: 1.7; margin-bottom: 1rem; }
        .card ul { color: var(--text-secondary); padding-left: 1.5rem; line-height: 1.8; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 20px;
            font-size: 0.8rem; font-weight: 600; background: rgba(99,102,241,0.1); color: var(--primary-color); margin-bottom: 1rem; }
        .nav-footer { display: flex; justify-content: space-between; align-items: center;
            padding: 2rem 0; border-top: 1px solid var(--border-color); margin-top: 2rem; }
        .btn { padding: 0.75rem 1.5rem; border-radius: 10px; text-decoration: none; font-weight: 600;
            border: none; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-secondary { background: var(--card-bg); color: var(--text-primary); border: 1px solid var(--border-color); }
        .btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .highlight-box { background: linear-gradient(135deg, rgba(99,102,241,0.08), rgba(139,92,246,0.08));
            border-left: 4px solid var(--primary-color); border-radius: 8px; padding: 1.25rem; margin: 1rem 0; }
        .step { display: flex; gap: 1rem; margin-bottom: 1.25rem; align-items: flex-start; }
        .step-num { width: 36px; height: 36px; border-radius: 50%; background: var(--primary-color);
            color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } .page-title { font-size: 1.6rem; } }
    </style>
    <style>
        .module-card { background: var(--card-bg); border-radius: 16px; padding: 1.5rem;
            border: 1px solid var(--border-color); box-shadow: var(--shadow); margin-bottom: 1rem; }
        .module-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .module-title { font-weight: 700; color: var(--text-primary); }
        .module-badge { font-size: 0.8rem; padding: 0.25rem 0.75rem; border-radius: 20px; font-weight: 600; }
        .badge-done { background: rgba(16,185,129,0.15); color: #10b981; }
        .badge-progress { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .badge-pending { background: rgba(148,163,184,0.15); color: #94a3b8; }
        .progress-bar { background: var(--bg-tertiary); border-radius: 20px; height: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary-color); border-radius: 20px; transition: width 0.5s ease; }
        .global-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card-bg); border-radius: 12px; padding: 1.25rem; text-align: center;
            border: 1px solid var(--border-color); box-shadow: var(--shadow); }
        .stat-num { font-size: 2rem; font-weight: 800; color: var(--primary-color); }
        .stat-label { font-size: 0.85rem; color: var(--text-secondary); }
        @media (max-width: 768px) { .global-stats { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-inner">
                <nav class="breadcrumb">
                    <a href="dashboard.html">Dashboard</a> &rsaquo; Suivi de Progression
                </nav>
                <button class="theme-btn" onclick="toggleTheme()">🌓</button>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <span class="badge">Tableau de bord</span>
            <h1 class="page-title">Votre Progression</h1>
            <p class="page-subtitle">Suivez votre avancement module par module</p>
            <div class="global-stats">
                <div class="stat-card"><div class="stat-num" id="stat-modules">0/8</div><div class="stat-label">Modules complétés</div></div>
                <div class="stat-card"><div class="stat-num" id="stat-pct">0%</div><div class="stat-label">Progression globale</div></div>
                <div class="stat-card"><div class="stat-num" id="stat-time">—</div><div class="stat-label">Temps estimé</div></div>
                <div class="stat-card"><div class="stat-num" id="stat-streak">🎯</div><div class="stat-label">Objectif</div></div>
            </div>
            <div id="modules-list">
                <!-- Modules générés par JS -->
            </div>
            <div class="nav-footer">
                <a href="dashboard.html" class="btn btn-secondary">&#8592; Dashboard</a>
                <a href="certification.html" class="btn btn-primary">Certification &#8594;</a>
            </div>
        </div>
    </main>
    <script>
        const MODULES = [
            { id: 1, name: "Fondamentaux de l'IA", icon: "🧠", href: "fondamentaux_1_overview.html", sequences: 4 },
            { id: 2, name: "Prompting", icon: "✍️", href: "prompting_2_overview.html", sequences: 4 },
            { id: 3, name: "Outils IA", icon: "🛠️", href: "outils_3_overview.html", sequences: 4 },
            { id: 4, name: "IA Générative", icon: "🎨", href: "generative_4_overview.html", sequences: 5 },
            { id: 5, name: "Automatisation", icon: "⚙️", href: "automatisation_5_overview.html", sequences: 4 },
            { id: 6, name: "Cas d'Usage", icon: "💼", href: "casusage_6_overview.html", sequences: 4 },
            { id: 7, name: "Éthique IA", icon: "⚖️", href: "ethique_7_overview.html", sequences: 3 },
            { id: 8, name: "Projet Final", icon: "🚀", href: "projet_8_overview.html", sequences: 4 }
        ];
        function toggleTheme() {
            const t = document.documentElement.getAttribute('data-theme');
            document.documentElement.setAttribute('data-theme', t === 'dark' ? 'light' : 'dark');
            localStorage.setItem('theme', t === 'dark' ? 'light' : 'dark');
        }
        document.addEventListener('DOMContentLoaded', function() {
            document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
            const progress = JSON.parse(localStorage.getItem('formation_progress') || '{}');
            const modules = progress.modules || {};
            let completedModules = 0;
            const list = document.getElementById('modules-list');
            MODULES.forEach(m => {
                const mProgress = modules[m.id] || {};
                const done = Object.values(mProgress).filter(v => v.completed).length;
                const pct = Math.round((done / m.sequences) * 100);
                if (pct === 100) completedModules++;
                const status = pct === 100 ? 'done' : pct > 0 ? 'progress' : 'pending';
                const label = pct === 100 ? '✓ Complété' : pct > 0 ? `${done}/${m.sequences} séquences` : 'Non commencé';
                list.innerHTML += `
                    <div class="module-card">
                        <div class="module-header">
                            <div class="module-title">${m.icon} Module ${m.id} — ${m.name}</div>
                            <span class="module-badge badge-${status}">${label}</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width:${pct}%"></div>
                        </div>
                        <div style="margin-top:0.75rem;">
                            <a href="${m.href}" style="color:var(--primary-color);font-size:0.9rem;text-decoration:none;">
                                ${pct === 100 ? 'Revoir le module' : pct > 0 ? 'Continuer' : 'Commencer'} →
                            </a>
                        </div>
                    </div>`;
            });
            const globalPct = Math.round((completedModules / 8) * 100);
            document.getElementById('stat-modules').textContent = completedModules + '/8';
            document.getElementById('stat-pct').textContent = globalPct + '%';
            document.getElementById('stat-time').textContent = completedModules * 4 + 'h';
            document.getElementById('stat-streak').textContent = completedModules === 8 ? '🏆' : '🎯';
        });
    </script>
</body>
</html>
